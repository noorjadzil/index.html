<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Huruf A-Z</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    padding: 20px;
}

h1 {
    color: #333;
}

#huruf {
    font-size: 120px;
    margin: 30px;
    color: #ff6600;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.pilihan {
    font-size: 40px;
    width: 80px;
    height: 80px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>Game Belajar Huruf</h1>

<!-- LEVEL 1 -->
<div id="level1">
    <h2>Level 1</h2>
    <div id="huruf">A</div>
    <button onclick="playSound()">🔊 Suara</button>
    <button onclick="nextHuruf()">➡️ Lanjut</button>
    <br>
    <button onclick="keLevel2()">➡️ Ke Level 2</button>
</div>

<!-- LEVEL 2 -->
<div id="level2" class="hidden">
    <h2>Level 2</h2>
    <button onclick="playSoal()">🔊 Dengarkan Soal</button>
    <div id="pilihan"></div>
</div>

<script>
let hurufList = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

// ================= LEVEL 1 =================
let acakHuruf = [];
let index = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function mulaiGame() {
    acakHuruf = [...hurufList];
    shuffle(acakHuruf);
    index = 0;
    tampilHuruf();
}

function tampilHuruf() {
    document.getElementById("huruf").innerText = acakHuruf[index];
}

function nextHuruf() {
    index++;
    if (index >= acakHuruf.length) {
        alert("Selesai! Ulang lagi ya 😊");
        mulaiGame();
    } else {
        tampilHuruf();
    }
}

function playSound() {
    let huruf = acakHuruf[index];
    bicara(huruf);
}

// ================= LEVEL 2 =================
let hurufSoal = "";

function keLevel2() {
    document.getElementById("level1").classList.add("hidden");
    document.getElementById("level2").classList.remove("hidden");
    buatSoal();
}

function buatSoal() {
    hurufSoal = hurufList[Math.floor(Math.random() * hurufList.length)];

    let pilihan = [hurufSoal];

    while (pilihan.length < 4) {
        let h = hurufList[Math.floor(Math.random() * hurufList.length)];
        if (!pilihan.includes(h)) pilihan.push(h);
    }

    shuffle(pilihan);

    let html = "";
    pilihan.forEach(h => {
        html += `<button class="pilihan" onclick="cekJawaban('${h}')">${h}</button>`;
    });

    document.getElementById("pilihan").innerHTML = html;

    playSoal();
}

function playSoal() {
    bicara("Manakah huruf " + hurufSoal);
}

function cekJawaban(jawaban) {
    if (jawaban === hurufSoal) {
        bicara("Selamat anda benar");
        setTimeout(buatSoal, 1500);
    } else {
        bicara("Anda salah, coba lagi");
    }
}

// ================= SUARA =================
function bicara(teks) {
    let msg = new SpeechSynthesisUtterance(teks);
    msg.lang = "id-ID";
    speechSynthesis.speak(msg);
}

// mulai
mulaiGame();
</script>

</body>
</html>
