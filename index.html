<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f0f8ff;
margin:0;
padding:10px;
}

h1{margin:10px;}

#score{
font-size:18px;
margin:10px;
}

#stars{
font-size:25px;
color:gold;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:320px;
margin:auto;
}

.pilihan{
font-size:35px;
padding:20px;
border-radius:12px;
border:none;
background:#4CAF50;
color:white;
transition:0.2s;
}

.pilihan:active{
transform:scale(0.85);
}

.benar{
background:green !important;
animation:pop 0.3s;
}

.salah{
background:red !important;
animation:shake 0.3s;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

.menu{
margin-top:15px;
}
</style>
</head>

<body>

<h1>Level 1</h1>

<div id="score">Skor: 0</div>
<div id="stars">⭐</div>

<label>Tingkat Kesulitan</label><br>
<select id="level" onchange="buatSoal()">
<option value="3">Mudah (3 huruf)</option>
<option value="6">Sedang (6 huruf)</option>
<option value="9" selected>Sulit (9 huruf)</option>
<option value="12">Expert (12 huruf)</option>
</select>

<br>
<button onclick="playSoal()">🔊 Ulangi Soal</button>

<div class="grid" id="pilihan"></div>

<div class="menu">
<button onclick="location.href='pengaturan.html'">⚙️ Pengaturan</button>
<button onclick="location.href='level2.html'">➡️ Level 2</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

// ================= SETTING =================
let gameSetting={pitch:1,speed:1,volume:1,voice:null,modeAnak:"off"};
let voices=[];

speechSynthesis.onvoiceschanged=()=>voices=speechSynthesis.getVoices();

db.ref("config/game").on("value",snap=>{
let s=snap.val();
if(s) gameSetting=s;
});

// ================= SUARA =================
function bicara(teks,delay=0){
setTimeout(()=>{
let msg=new SpeechSynthesisUtterance(teks);
msg.pitch=gameSetting.pitch||1;
msg.rate=gameSetting.speed||1;
msg.volume=gameSetting.volume||1;
if(voices[gameSetting.voice]) msg.voice=voices[gameSetting.voice];
speechSynthesis.speak(msg);
},delay);
}

// ================= GAME =================
let hurufList="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let hurufSoal="";
let skor=0;
let benarStreak=0;

let soalVariasi=[
"Manakah huruf ",
"Cari huruf ",
"Pilih huruf ",
"Ayo temukan huruf ",
"Mana huruf ",
"Huruf yang benar adalah "
];

function randomHuruf(){
let h=hurufList[Math.floor(Math.random()*hurufList.length)];
return Math.random()>0.5 ? h : h.toLowerCase();
}

function buatSoal(){
let jumlah=parseInt(document.getElementById("level").value);

hurufSoal=randomHuruf();

let pilihan=[hurufSoal];

while(pilihan.length<jumlah){
let h=randomHuruf();
if(!pilihan.map(x=>x.toLowerCase()).includes(h.toLowerCase())){
pilihan.push(h);
}
}

pilihan.sort(()=>Math.random()-0.5);

let html="";
pilihan.forEach(h=>{
html+=`<button class="pilihan" onclick="jawab('${h}',this)">${h}</button>`;
});

document.getElementById("pilihan").innerHTML=html;

playSoal();
}

function playSoal(){
let teks=soalVariasi[Math.floor(Math.random()*soalVariasi.length)] + hurufSoal;
bicara(teks);
}

// ================= JAWAB =================
function jawab(jawaban,el){

if(jawaban.toLowerCase()===hurufSoal.toLowerCase()){

el.classList.add("benar");
skor++;
benarStreak++;

updateScore();

suaraBenar();

setTimeout(buatSoal,1800);

}else{

el.classList.add("salah");
benarStreak=0;

suaraSalah();
}
}

// ================= SUARA VARIASI =================
function suaraSalah(){
let variasi=[
["Anda salah","coba lagi"],
["Kamu salah","ayo coba lagi"],
["Ups salah","coba lagi ya"]
];

let v=variasi[Math.floor(Math.random()*variasi.length)];

bicara(v[0]);
bicara(v[1],1000);
}

function suaraBenar(){

let variasi=[
["Anda benar","wow hebat"],
["Wow hebat","kamu benar"],
["Bagus sekali","kamu benar"]
];

let v=variasi[Math.floor(Math.random()*variasi.length)];

bicara(v[0]);
bicara(v[1],1000);

if(benarStreak>=5){
bicara("sempurna",2000);
}
}

// ================= SCORE =================
function updateScore(){
document.getElementById("score").innerText="Skor: "+skor;

let bintang="⭐";
if(skor>5) bintang="⭐⭐";
if(skor>10) bintang="⭐⭐⭐";

document.getElementById("stars").innerText=bintang;
}

// mulai
setTimeout(buatSoal,500);
</script>

</body>
</html>
