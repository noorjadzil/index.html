<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
.container{max-width:420px;margin:auto;padding:10px;}
.card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.tabs{display:flex;background:#1e3a8a;border-radius:12px 12px 0 0;overflow:hidden;margin-bottom:10px;}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:white;font-weight:700;}
.tab-btn.active{background:#3b82f6;}
h2{text-align:center;color:#1e3a8a;}
label{font-weight:700;font-size:13px;margin-top:8px;display:block;}
select,input[type="number"]{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5f5;margin-bottom:10px;font-weight:600;}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;}
.row input{width:80px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a8a;color:white;font-weight:700;margin-top:15px;}
img{width:100%;border-radius:10px;margin-top:8px;}
#catatan{width:100%;padding:12px;margin-top:6px;border-radius:10px;border:1px solid #cbd5f5;font-size:15px;font-weight:600;box-sizing:border-box;}

.laporan-card{background:white;margin-top:12px;padding:12px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.laporan-header{font-size:18px;font-weight:700;color:#1e3a8a;margin-bottom:6px;}
.laporan-tanggal{display:inline-block;background:#e0edff;color:#1e3a8a;padding:4px 10px;border-radius:8px;font-size:16px;font-weight:700;margin-bottom:8px;}
.laporan-items{margin-top:6px;line-height:1.5;font-weight:600;}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showTab('input',event)">Input</button>
<button class="tab-btn" onclick="showTab('laporan',event)">Laporan</button>
</div>

<div class="card">

<!-- INPUT -->
<div id="inputTab">

<h2>Input Jajan</h2>

<label>Foto</label>
<input type="file" id="foto" accept="image/*" capture="environment">
<img id="preview" style="display:none">

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<!-- 🔥 DIPISAH -->
<div class="row"><span>Tahu</span><input type="number" id="tahu"></div>
<div class="row"><span>Batagor</span><input type="number" id="batagor"></div>

<div class="row"><span>Cimol</span><input type="number" id="cimol"></div>
<div class="row"><span>Cireng</span><input type="number" id="cireng"></div>

<div class="row"><span>Kripik Kolek</span><input type="number" id="kripik_kolek"></div>
<div class="row"><span>Piscok Molen</span><input type="number" id="piscok_molen"></div>
<div class="row"><span>Dimsum Maklor Moci</span><input type="number" id="dimsum_maklor_moci"></div>
<div class="row"><span>Kebab</span><input type="number" id="kebab"></div>
<div class="row"><span>Sosis Roti Gurita</span><input type="number" id="sosis_roti_gurita"></div>

<label>Catatan</label>
<textarea id="catatan" rows="3"></textarea>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>

<!-- LAPORAN -->
<div id="laporanTab" style="display:none">
<h2>Laporan</h2>
<div id="listLaporan">Loading...</div>
</div>

</div>
</div>

<script>

function showTab(tab,e){
document.getElementById("inputTab").style.display = tab==="input"?"block":"none";
document.getElementById("laporanTab").style.display = tab==="laporan"?"block":"none";

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

if(tab==="laporan") loadLaporan();
}

function formatTanggal(waktu){
let d=new Date(waktu);
return d.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+
" - "+d.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
}

// PREVIEW FOTO
document.getElementById("foto").addEventListener("change",function(e){
let f=e.target.files[0];
if(!f) return;
let r=new FileReader();
r.onload=e=>{
preview.src=e.target.result;
preview.style.display="block";
}
r.readAsDataURL(f);
});

// KIRIM
async function kirim(){

let tombol=document.getElementById("tombol");
if(tombol.disabled) return;

tombol.innerText="Mengirim...";
tombol.disabled=true;

let items=[];

// 🔥 TAHU BATAGOR (AKURAT)
let tahu = parseInt(document.getElementById("tahu").value)||0;
let batagor = parseInt(document.getElementById("batagor").value)||0;

if(tahu+batagor>0){
items.push({
barang:"Tahu Batagor",
jumlah:tahu+batagor,
detail:{tahu,batagor}
});
}

// 🔥 CIMOL CIRENG (AKURAT)
let cimol = parseInt(document.getElementById("cimol").value)||0;
let cireng = parseInt(document.getElementById("cireng").value)||0;

if(cimol+cireng>0){
items.push({
barang:"Cimol Cireng",
jumlah:cimol+cireng,
detail:{cimol,cireng}
});
}

// lainnya
function tambah(nama,id){
let v=document.getElementById(id).value;
if(v && v!=0){
items.push({barang:nama,jumlah:v});
}
}

tambah("Kripik Kolek","kripik_kolek");
tambah("Piscok Molen","piscok_molen");
tambah("Dimsum Maklor Moci","dimsum_maklor_moci");
tambah("Kebab","kebab");
tambah("Sosis Roti Gurita","sosis_roti_gurita");

let data={
waktu:new Date().toISOString(),
tempat:tempat.value,
jenis:jenis.value,
items:items,
catatan:catatan.value
};

await db.ref("jajan").push(data);

alert("Berhasil");
kosongkan();

tombol.innerText="Simpan";
tombol.disabled=false;
}

// LAPORAN AKURAT
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";
if(!snap.val()) return list.innerHTML="Belum ada data";

Object.values(snap.val()).reverse().forEach(d=>{

let items = d.items.map(i=>{

// 🔥 pakai detail kalau ada
if(i.detail){

if(i.barang==="Tahu Batagor"){
return `• Tahu (${i.detail.tahu})<br>• Batagor (${i.detail.batagor})`;
}

if(i.barang==="Cimol Cireng"){
return `• Cimol (${i.detail.cimol})<br>• Cireng (${i.detail.cireng})`;
}

}

// fallback lama
return `• ${i.barang} (${i.jumlah})`;

}).join("<br>");

let div=document.createElement("div");
div.className="laporan-card";
div.innerHTML=`
<div class="laporan-header">${d.jenis} - ${d.tempat}</div>
<div class="laporan-tanggal">${formatTanggal(d.waktu)}</div>
<div class="laporan-items">${items}</div>

${d.catatan?`<div style="color:red;margin-top:6px">Catatan: ${d.catatan}</div>`:""}
`;

list.appendChild(div);

});

});
}

function kosongkan(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("catatan").value="";
document.getElementById("preview").style.display="none";
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"ISI_SENDIRI",
authDomain:"ISI_SENDIRI",
databaseURL:"ISI_SENDIRI",
projectId:"ISI_SENDIRI",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
</script>

</body>
</html>
