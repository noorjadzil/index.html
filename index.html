<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar Huruf A-Z</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    padding: 20px;
}

h1 {
    color: #333;
}

#huruf {
    font-size: 150px;
    margin: 40px;
    color: #ff6600;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}
</style>
</head>

<body>

<h1>Belajar Huruf A - Z</h1>

<div id="huruf">A</div>

<button onclick="playSound()">🔊 Suara</button>
<button onclick="nextHuruf()">➡️ Lanjut</button>

<script>
let hurufList = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let acakHuruf = [];
let index = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function mulaiGame() {
    acakHuruf = [...hurufList];
    shuffle(acakHuruf);
    index = 0;
    tampilHuruf();
}

function tampilHuruf() {
    document.getElementById("huruf").innerText = acakHuruf[index];
}

function nextHuruf() {
    index++;
    if (index >= acakHuruf.length) {
        alert("Semua huruf sudah dipelajari! Ulang lagi ya 😊");
        mulaiGame();
    } else {
        tampilHuruf();
    }
}

function playSound() {
    let huruf = acakHuruf[index];
    let msg = new SpeechSynthesisUtterance(huruf);
    msg.lang = "id-ID";
    speechSynthesis.speak(msg);
}

// mulai
mulaiGame();
</script>

</body>
</html>
