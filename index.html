<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Huruf Suara</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    padding: 20px;
}

h1 {
    color: #333;
}

img {
    width: 200px;
    height: 200px;
    margin: 20px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

#hasil {
    font-size: 24px;
    margin-top: 20px;
}

#score {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>Game Tebak Huruf (Suara)</h1>

<img id="gambar" src="" alt="gambar huruf">

<br>
<button onclick="mulaiJawab()">🎤 Jawab dengan Suara</button>

<div id="hasil"></div>
<div id="score">Benar: 0 | Salah: 0</div>

<script>
const dataHuruf = [
    {huruf: "A", gambar: "https://dummyimage.com/200x200/000/fff&text=A"},
    {huruf: "B", gambar: "https://dummyimage.com/200x200/000/fff&text=B"},
    {huruf: "C", gambar: "https://dummyimage.com/200x200/000/fff&text=C"},
    {huruf: "D", gambar: "https://dummyimage.com/200x200/000/fff&text=D"},
    {huruf: "E", gambar: "https://dummyimage.com/200x200/000/fff&text=E"},
    {huruf: "F", gambar: "https://dummyimage.com/200x200/000/fff&text=F"},
    {huruf: "G", gambar: "https://dummyimage.com/200x200/000/fff&text=G"},
    {huruf: "H", gambar: "https://dummyimage.com/200x200/000/fff&text=H"},
    {huruf: "I", gambar: "https://dummyimage.com/200x200/000/fff&text=I"},
    {huruf: "J", gambar: "https://dummyimage.com/200x200/000/fff&text=J"},
    {huruf: "K", gambar: "https://dummyimage.com/200x200/000/fff&text=K"},
    {huruf: "L", gambar: "https://dummyimage.com/200x200/000/fff&text=L"},
    {huruf: "M", gambar: "https://dummyimage.com/200x200/000/fff&text=M"},
    {huruf: "N", gambar: "https://dummyimage.com/200x200/000/fff&text=N"},
    {huruf: "O", gambar: "https://dummyimage.com/200x200/000/fff&text=O"},
    {huruf: "P", gambar: "https://dummyimage.com/200x200/000/fff&text=P"},
    {huruf: "Q", gambar: "https://dummyimage.com/200x200/000/fff&text=Q"},
    {huruf: "R", gambar: "https://dummyimage.com/200x200/000/fff&text=R"},
    {huruf: "S", gambar: "https://dummyimage.com/200x200/000/fff&text=S"},
    {huruf: "T", gambar: "https://dummyimage.com/200x200/000/fff&text=T"},
    {huruf: "U", gambar: "https://dummyimage.com/200x200/000/fff&text=U"},
    {huruf: "V", gambar: "https://dummyimage.com/200x200/000/fff&text=V"},
    {huruf: "W", gambar: "https://dummyimage.com/200x200/000/fff&text=W"},
    {huruf: "X", gambar: "https://dummyimage.com/200x200/000/fff&text=X"},
    {huruf: "Y", gambar: "https://dummyimage.com/200x200/000/fff&text=Y"},
    {huruf: "Z", gambar: "https://dummyimage.com/200x200/000/fff&text=Z"}
];

let hurufSekarang = "";
let benar = 0;
let salah = 0;

function randomSoal() {
    let random = dataHuruf[Math.floor(Math.random() * dataHuruf.length)];
    hurufSekarang = random.huruf;
    document.getElementById("gambar").src = random.gambar;
}

function mulaiJawab() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Browser tidak mendukung suara");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "id-ID";
    recognition.start();

    recognition.onresult = function(event) {
        let hasilSuara = event.results[0][0].transcript.toUpperCase().trim();
        cekJawaban(hasilSuara);
    };
}

function cekJawaban(jawaban) {
    if (jawaban === hurufSekarang) {
        document.getElementById("hasil").innerText = "✅ Benar!";
        benar++;
    } else {
        document.getElementById("hasil").innerText = "❌ Salah! Jawaban: " + hurufSekarang;
        salah++;
    }

    updateScore();

    setTimeout(() => {
        document.getElementById("hasil").innerText = "";
        randomSoal();
    }, 1500);
}

function updateScore() {
    document.getElementById("score").innerText =
        "Benar: " + benar + " | Salah: " + salah;
}

// mulai
randomSoal();
</script>

</body>
</html>
