<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Suara TTS</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    padding: 20px;
}

button, select {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

h1 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>Demo Suara Kata: "BAJU"</h1>

<div>
    <label>Pilih Suara:</label><br>
    <select id="voiceSelect"></select>
</div>

<div>
    <label>Kecepatan:</label><br>
    <select id="speed">
        <option value="0.3">Super Lambat</option>
        <option value="0.5">Lambat</option>
        <option value="0.7">Agak Lambat</option>
        <option value="1" selected>Normal</option>
        <option value="1.3">Agak Cepat</option>
        <option value="1.6">Cepat</option>
        <option value="2">Super Cepat</option>
    </select>
</div>

<br>

<button onclick="bicara()">🔊 Ucapkan "Baju"</button>

<script>
let voices = [];

function loadVoices() {
    voices = speechSynthesis.getVoices();
    let select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    voices.forEach((voice, i) => {
        let option = document.createElement("option");
        option.value = i;
        option.text = voice.name + " (" + voice.lang + ")";
        select.appendChild(option);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;

function bicara() {
    let msg = new SpeechSynthesisUtterance("baju");

    let selectedVoice = document.getElementById("voiceSelect").value;
    let speed = document.getElementById("speed").value;

    msg.voice = voices[selectedVoice];
    msg.rate = speed;
    msg.pitch = 1;

    speechSynthesis.speak(msg);
}
</script>

</body>
</html>
