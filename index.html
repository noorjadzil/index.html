<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Mengenal Huruf</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f0f8ff;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    #huruf {
        font-size: 120px;
        margin: 20px;
        color: #ff6600;
    }

    .btn {
        padding: 15px 25px;
        margin: 10px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #4CAF50;
        color: white;
    }

    .btn:hover {
        background: #45a049;
    }

    #hasil {
        font-size: 24px;
        margin-top: 20px;
    }

    #score {
        margin-top: 20px;
        font-size: 20px;
    }
</style>
</head>

<body>

<h1>Game Mengenal Huruf A - Z</h1>

<div id="huruf">A</div>

<button class="btn" onclick="playSound()">🔊 Dengarkan</button>

<div id="pilihan"></div>

<div id="hasil"></div>
<div id="score">Benar: 0 | Salah: 0</div>

<script>
const hurufList = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let hurufBenar = "";
let benar = 0;
let salah = 0;

function randomHuruf() {
    hurufBenar = hurufList[Math.floor(Math.random() * hurufList.length)];
    document.getElementById("huruf").innerText = hurufBenar;
    generatePilihan();
}

function generatePilihan() {
    let pilihan = [hurufBenar];

    while (pilihan.length < 4) {
        let random = hurufList[Math.floor(Math.random() * hurufList.length)];
        if (!pilihan.includes(random)) {
            pilihan.push(random);
        }
    }

    pilihan.sort(() => Math.random() - 0.5);

    let html = "";
    pilihan.forEach(h => {
        html += `<button class="btn" onclick="cekJawaban('${h}')">${h}</button>`;
    });

    document.getElementById("pilihan").innerHTML = html;
}

function cekJawaban(jawaban) {
    if (jawaban === hurufBenar) {
        document.getElementById("hasil").innerText = "✅ Benar!";
        benar++;
    } else {
        document.getElementById("hasil").innerText = "❌ Salah!";
        salah++;
    }

    updateScore();

    setTimeout(() => {
        document.getElementById("hasil").innerText = "";
        randomHuruf();
    }, 1000);
}

function updateScore() {
    document.getElementById("score").innerText = 
        "Benar: " + benar + " | Salah: " + salah;
}

function playSound() {
    let msg = new SpeechSynthesisUtterance(hurufBenar);
    msg.lang = "id-ID";
    speechSynthesis.speak(msg);
}

// Mulai game
randomHuruf();
</script>

</body>
</html>
