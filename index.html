<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Variasi Suara</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    padding: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
}

button:hover {
    background: #45a049;
}

h1 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>Demo Suara "BAJU"</h1>

<h3>🔊 Jenis Suara (pakai pitch)</h3>
<button onclick="suaraBerat()">Suara Berat (mirip laki)</button>
<button onclick="suaraNormal()">Suara Normal</button>
<button onclick="suaraTinggi()">Suara Tinggi (mirip anak)</button>

<h3>⏱️ Kecepatan</h3>
<button onclick="superLambat()">Super Lambat</button>
<button onclick="normal()">Normal</button>
<button onclick="superCepat()">Super Cepat</button>

<script>
function bicara(teks, pitch=1, rate=1) {
    let msg = new SpeechSynthesisUtterance(teks);
    msg.lang = "id-ID";

    msg.pitch = pitch; // tinggi rendah suara
    msg.rate = rate;   // cepat lambat

    speechSynthesis.cancel(); // hentikan sebelumnya
    speechSynthesis.speak(msg);
}

// ================= SUARA =================
function suaraBerat() {
    bicara("baju", 0.5, 0.9); // lebih rendah
}

function suaraNormal() {
    bicara("baju", 1, 1);
}

function suaraTinggi() {
    bicara("baju", 1.8, 1); // lebih tinggi
}

// ================= KECEPATAN =================
function superLambat() {
    bicara("baju", 1, 0.4);
}

function normal() {
    bicara("baju", 1, 1);
}

function superCepat() {
    bicara("baju", 1, 1.8);
}
</script>

</body>
</html>
