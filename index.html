<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomberman Web</title>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    background:black;
    margin-top:10px;
    border:2px solid white;
}

</style>

</head>

<body>

<h2>Bomberman Web</h2>
<p>Gerak: Arrow Keys | Bom: Spasi</p>

<canvas id="game" width="480" height="480"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const tile = 48
const size = 10

let map = []

let player = {
x:1,
y:1
}

let bombs = []
let explosions = []

function createMap(){

for(let y=0;y<size;y++){

let row=[]

for(let x=0;x<size;x++){

if(x==0 || y==0 || x==size-1 || y==size-1){
row.push(1)
}

else if(x%2==0 && y%2==0){
row.push(1)
}

else if(Math.random()<0.3 && !(x<=2 && y<=2)){
row.push(2)
}

else{
row.push(0)
}

}

map.push(row)
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

if(map[y][x]==1){
ctx.fillStyle="gray"
ctx.fillRect(x*tile,y*tile,tile,tile)
}

if(map[y][x]==2){
ctx.fillStyle="brown"
ctx.fillRect(x*tile,y*tile,tile,tile)
}

}
}

ctx.fillStyle="blue"
ctx.fillRect(player.x*tile+8,player.y*tile+8,32,32)

bombs.forEach(b=>{
ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(b.x*tile+24,b.y*tile+24,10,0,Math.PI*2)
ctx.fill()
})

explosions.forEach(e=>{
ctx.fillStyle="orange"
ctx.fillRect(e.x*tile,e.y*tile,tile,tile)
})

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(map[ny][nx]==0){
player.x=nx
player.y=ny
}

}

function placeBomb(){

bombs.push({
x:player.x,
y:player.y
})

let index=bombs.length-1

setTimeout(()=>{
explode(index)
},1000)

}

function explode(i){

let b=bombs[i]

let dirs=[
[0,0],
[1,0],
[-1,0],
[0,1],
[0,-1]
]

dirs.forEach(d=>{

let x=b.x+d[0]
let y=b.y+d[1]

explosions.push({x,y})

if(map[y][x]==2){
map[y][x]=0
}

if(player.x==x && player.y==y){
alert("Game Over")
location.reload()
}

})

setTimeout(()=>{
explosions=[]
},300)

bombs.splice(i,1)

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowLeft") move(-1,0)
if(e.key=="ArrowRight") move(1,0)
if(e.key=="ArrowUp") move(0,-1)
if(e.key=="ArrowDown") move(0,1)

if(e.code=="Space") placeBomb()

})

function gameLoop(){

draw()
requestAnimationFrame(gameLoop)

}

createMap()
gameLoop()

</script>

</body>
</html>
