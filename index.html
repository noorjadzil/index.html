<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Huruf 2 Pemain Berhadapan</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
    margin: 0;
}

h1 {
    margin: 10px;
}

#score {
    font-size: 20px;
    margin: 10px;
}

.area {
    padding: 20px;
}

.atas {
    background: #d0f0ff;
}

.bawah {
    background: #ffd0d0;
    transform: rotate(180deg); /* INI KUNCI NYA */
}

.pilihan {
    font-size: 40px;
    width: 80px;
    height: 80px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Game Huruf Berhadapan</h1>

<div id="score">
Atas: <span id="scoreAtas">0</span> |
Bawah: <span id="scoreBawah">0</span>
</div>

<button onclick="playSoal()">🔊 Dengarkan Soal</button>

<!-- PEMAIN ATAS -->
<div class="area atas">
    <h2>👆 Pemain Atas</h2>
    <div id="pilihanAtas"></div>
</div>

<!-- PEMAIN BAWAH (DIPUTAR) -->
<div class="area bawah">
    <h2>👇 Pemain Bawah</h2>
    <div id="pilihanBawah"></div>
</div>

<script>
let hurufList = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let hurufSoal = "";

let scoreAtas = 0;
let scoreBawah = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function buatSoal() {
    hurufSoal = hurufList[Math.floor(Math.random() * hurufList.length)];

    let pilihan = [hurufSoal];

    while (pilihan.length < 4) {
        let h = hurufList[Math.floor(Math.random() * hurufList.length)];
        if (!pilihan.includes(h)) pilihan.push(h);
    }

    shuffle(pilihan);

    let htmlAtas = "";
    let htmlBawah = "";

    pilihan.forEach(h => {
        htmlAtas += `<button class="pilihan" onclick="jawab('atas','${h}')">${h}</button>`;
        htmlBawah += `<button class="pilihan" onclick="jawab('bawah','${h}')">${h}</button>`;
    });

    document.getElementById("pilihanAtas").innerHTML = htmlAtas;
    document.getElementById("pilihanBawah").innerHTML = htmlBawah;

    playSoal();
}

function playSoal() {
    bicara("Manakah huruf " + hurufSoal);
}

function jawab(pemain, jawaban) {
    if (jawaban === hurufSoal) {
        if (pemain === "atas") scoreAtas++;
        else scoreBawah++;

        updateScore();
        bicara("Selamat anda benar");

        setTimeout(buatSoal, 1200);
    } else {
        bicara("Anda salah, coba lagi");
    }
}

function updateScore() {
    document.getElementById("scoreAtas").innerText = scoreAtas;
    document.getElementById("scoreBawah").innerText = scoreBawah;
}

function bicara(teks) {
    let msg = new SpeechSynthesisUtterance(teks);
    msg.lang = "id-ID";
    speechSynthesis.speak(msg);
}

// mulai
buatSoal();
</script>

</body>
</html>
