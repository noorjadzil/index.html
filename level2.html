<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengeja Interaktif</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:15px;
}

h1{margin-bottom:10px;}

.kotak{
background:white;
border-radius:15px;
padding:20px;
max-width:420px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bar{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
font-size:45px;
margin-bottom:15px;
}

.hasil{
font-size:40px;
font-weight:bold;
color:#1e3a8a;
margin-top:10px;
}

.click{
cursor:pointer;
padding:10px;
border-radius:10px;
}

.click:active{
transform:scale(0.9);
background:#fde68a;
}

.vokal{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

.huruf{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:20px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
font-size:16px;
}

button:active{
transform:scale(0.9);
}
</style>
</head>

<body>

<h1>Belajar Mengeja</h1>

<div class="kotak">

<div class="bar">
<span id="konsonan" class="click" onclick="suaraHuruf(konsonan)">B</span>
<span>+</span>
<span id="vokalDisplay" class="click" onclick="suaraHuruf(vokal)">A</span>
</div>

<div id="hasil" class="hasil click" onclick="suaraGabung()">
BA
</div>

<div class="vokal">
<button onclick="pilihVokal('A')">A</button>
<button onclick="pilihVokal('I')">I</button>
<button onclick="pilihVokal('U')">U</button>
<button onclick="pilihVokal('E')">E</button>
<button onclick="pilihVokal('O')">O</button>
</div>

</div>

<!-- PILIH HURUF -->
<div class="huruf" id="hurufContainer"></div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

let konsonan = "B";
let vokal = "A";

// ================= SUARA LEBIH NATURAL =================
// trik: pakai huruf kecil + bahasa indonesia
function suaraHuruf(teks){
let msg = new SpeechSynthesisUtterance(teks.toLowerCase());
msg.lang = "id-ID";
msg.rate = 0.8; // diperlambat biar jelas
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// khusus gabungan biar tidak dieja
function suaraGabung(){
let kata = (konsonan + vokal).toLowerCase();

let msg = new SpeechSynthesisUtterance(kata);
msg.lang = "id-ID";
msg.rate = 0.7;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){
document.getElementById("konsonan").innerText = konsonan;
document.getElementById("vokalDisplay").innerText = vokal;
document.getElementById("hasil").innerText = konsonan + vokal;
}

// ================= PILIH =================
function pilihVokal(v){
vokal = v;
update();
suaraHuruf(v);
}

function pilihKonsonan(h){
konsonan = h;
update();
suaraHuruf(h);
}

// ================= GENERATE TOMBOL =================
let html="";
hurufList.forEach(h=>{
html += `<button onclick="pilihKonsonan('${h}')">${h}</button>`;
});
document.getElementById("hurufContainer").innerHTML = html;

// start
update();
</script>

</body>
</html>
