<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar Mengeja</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:15px;
}

h1{
margin-bottom:10px;
}

.container{
max-width:400px;
margin:auto;
}

.kotak{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bar{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
font-size:40px;
margin-bottom:15px;
}

.hasil{
font-size:35px;
font-weight:bold;
color:#1e3a8a;
margin-bottom:20px;
}

.vokal{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

button{
padding:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
}

button:active{
transform:scale(0.9);
}

.nav{
margin-top:15px;
}

.nav button{
background:#1e3a8a;
}
</style>
</head>

<body>

<h1>Belajar Mengeja</h1>

<div class="container">
<div class="kotak">

<div class="bar">
<span id="konsonan">B</span>
<span>+</span>
<span id="vokalDisplay">A</span>
</div>

<div class="hasil" id="hasil">BA</div>

<div class="vokal">
<button onclick="pilihVokal('A')">A</button>
<button onclick="pilihVokal('I')">I</button>
<button onclick="pilihVokal('U')">U</button>
<button onclick="pilihVokal('E')">E</button>
<button onclick="pilihVokal('O')">O</button>
</div>

</div>

<div class="nav">
<button onclick="prevHuruf()">⬅️</button>
<button onclick="nextHuruf()">➡️</button>
</div>

</div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

let index = 0;
let konsonan = hurufList[index];
let vokal = "A";

// ================= SUARA =================
function bicara(teks){
let msg = new SpeechSynthesisUtterance(teks);
msg.lang = "id-ID";
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){
document.getElementById("konsonan").innerText = konsonan;
document.getElementById("vokalDisplay").innerText = vokal;
document.getElementById("hasil").innerText = konsonan + vokal;
}

// ================= PILIH VOKAL =================
function pilihVokal(v){
vokal = v;
update();

bicara(konsonan);
