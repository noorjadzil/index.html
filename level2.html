<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengeja Gabungan Fix</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:15px;
}

h1{margin-bottom:10px;}

.kotak{
background:white;
border-radius:15px;
padding:20px;
max-width:450px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bar{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-size:30px;
flex-wrap:wrap;
margin-bottom:10px;
}

.hasil{
font-size:35px;
font-weight:bold;
color:#1e3a8a;
margin-top:15px;
}

.click{
cursor:pointer;
padding:8px;
border-radius:10px;
}

.click:active{
transform:scale(0.9);
background:#fde68a;
}

.vokal{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.huruf{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:20px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
}

.mode{
margin-top:10px;
}
</style>
</head>

<body>

<h1>Mengeja Gabungan</h1>

<div class="kotak">

<!-- SLOT 1 -->
<div class="bar">
<span class="click" onclick="suara(k1)">{{k1}}</span>
<span>+</span>
<span class="click" onclick="suara(v1)">{{v1}}</span>
<span>=</span>
<span class="click" onclick="suara(suku1)" id="suku1">BA</span>
</div>

<!-- SLOT 2 -->
<div class="bar" id="slot2" style="display:none;">
<span class="click" onclick="suara(k2)">{{k2}}</span>
<span>+</span>
<span class="click" onclick="suara(v2)">{{v2}}</span>
<span>=</span>
<span class="click" onclick="suara(suku2)" id="suku2">PI</span>
</div>

<!-- HASIL -->
<div class="hasil click" onclick="suara(hasil)" id="hasil">BA</div>

<div class="vokal">
<button onclick="pilihVokal('A')">A</button>
<button onclick="pilihVokal('I')">I</button>
<button onclick="pilihVokal('U')">U</button>
<button onclick="pilihVokal('E')">E</button>
<button onclick="pilihVokal('O')">O</button>
</div>

<div class="mode">
<button onclick="aktifkanSlot2()">+ Gabung Lagi</button>
<button onclick="reset()">Reset</button>
</div>

</div>

<div class="huruf" id="hurufContainer"></div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

// SLOT 1
let k1="B", v1="A", suku1="BA";

// SLOT 2
let k2="", v2="", suku2="";

// MODE
let aktifSlot = 1;

// ================= SUARA =================
function suara(teks){
if(!teks) return;
let msg = new SpeechSynthesisUtterance(teks.toLowerCase());
msg.lang = "id-ID";
msg.rate = 0.7;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){

suku1 = k1 + v1;
document.getElementById("suku1").innerText = suku1;

if(aktifSlot === 1){
document.getElementById("hasil").innerText = suku1;
}

if(aktifSlot === 2){
suku2 = k2 + v2;
document.getElementById("suku2").innerText = suku2;

let hasilGabung = suku1 + suku2;
document.getElementById("hasil").innerText = hasilGabung;
}
}

// ================= PILIH =================
function pilihKonsonan(h){

if(aktifSlot === 1){
k1 = h;
}else{
k2 = h;
}

update();
suara(h);
}

function pilihVokal(v){

if(aktifSlot === 1){
v1 = v;
}else{
v2 = v;
}

update();
suara(v);
}

// ================= SLOT 2 =================
function aktifkanSlot2(){
aktifSlot = 2;
document.getElementById("slot2").style.display = "flex";
}

// ================= RESET =================
function reset(){
k1="B"; v1="A";
k2=""; v2="";
aktifSlot = 1;

document.getElementById("slot2").style.display = "none";

update();
}

// ================= TOMBOL HURUF =================
let html="";
hurufList.forEach(h=>{
html += `<button onclick="pilihKonsonan('${h}')">${h}</button>`;
});
document.getElementById("hurufContainer").innerHTML = html;

// start
update();
</script>

</body>
</html>
