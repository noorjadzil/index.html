<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengeja Rapi</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:20px;
}

h1{margin-bottom:10px;}

.kotak{
background:white;
border-radius:15px;
padding:20px;
max-width:420px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.gabungan{
font-size:35px;
margin-bottom:10px;
}

.hasil{
font-size:40px;
font-weight:bold;
color:#1e3a8a;
}

.click{
cursor:pointer;
padding:8px 12px;
border-radius:10px;
}

.click:active{
background:#fde68a;
transform:scale(0.9);
}

.vokal{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

.huruf{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:20px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
}
</style>
</head>

<body>

<h1>Mengeja</h1>

<div class="kotak">

<div class="gabungan">
<span id="suku1" class="click" onclick="suara(suku1)">BA</span>
+
<span id="suku2" class="click" onclick="suara(suku2)">PI</span>
</div>

<div id="hasil" class="hasil click" onclick="suaraGabung()">
BAPI
</div>

<div class="vokal">
<button onclick="pilihVokal('A')">A</button>
<button onclick="pilihVokal('I')">I</button>
<button onclick="pilihVokal('U')">U</button>
<button onclick="pilihVokal('E')">E</button>
<button onclick="pilihVokal('O')">O</button>
</div>

</div>

<div class="huruf" id="hurufContainer"></div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

// suku 1
let k1="B", v1="A", suku1="BA";

// suku 2
let k2="P", v2="I", suku2="PI";

// mode pilih
let mode = 1;

// ================= SUARA =================
function suara(teks){
if(!teks) return;
let msg = new SpeechSynthesisUtterance(teks.toLowerCase());
msg.lang = "id-ID";
msg.rate = 0.7;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// suara gabungan (lebih halus)
function suaraGabung(){
let kata = (suku1 + suku2).toLowerCase();
let msg = new SpeechSynthesisUtterance(kata);
msg.lang = "id-ID";
msg.rate = 0.65;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){
suku1 = k1 + v1;
suku2 = k2 + v2;

document.getElementById("suku1").innerText = suku1;
document.getElementById("suku2").innerText = suku2;
document.getElementById("hasil").innerText = suku1 + suku2;
}

// ================= PILIH =================
function pilihKonsonan(h){
if(mode===1){
k1 = h;
mode = 2;
}else{
k2 = h;
mode = 1;
}
update();
suara(h);
}

function pilihVokal(v){
if(mode===1){
v1 = v;
mode = 2;
}else{
v2 = v;
mode = 1;
}
update();
suara(v);
}

// ================= TOMBOL HURUF =================
let html="";
hurufList.forEach(h=>{
html += `<button onclick="pilihKonsonan('${h}')">${h}</button>`;
});
document.getElementById("hurufContainer").innerHTML = html;

// start
update();
</script>

</body>
</html>
