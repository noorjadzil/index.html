<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengeja Level Lanjut</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:15px;
}

h1{margin-bottom:10px;}

.kotak{
background:white;
border-radius:15px;
padding:20px;
max-width:450px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bar{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-size:35px;
flex-wrap:wrap;
}

.hasil{
font-size:35px;
font-weight:bold;
color:#1e3a8a;
margin-top:15px;
}

.click{
cursor:pointer;
padding:8px;
border-radius:10px;
}

.click:active{
transform:scale(0.9);
background:#fde68a;
}

.vokal{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

.huruf{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:20px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#f97316;
color:white;
}

.mode{
margin-top:10px;
}
</style>
</head>

<body>

<h1>Mengeja Gabungan</h1>

<div class="kotak">

<div class="bar">
<span class="click" onclick="suara(teks1)">{{1}}</span>
<span>+</span>
<span class="click" onclick="suara(teks2)">{{2}}</span>
</div>

<div class="bar">
<span class="click" onclick="suara(gabung1)" id="gabung1">BA</span>
<span id="plus2" style="display:none;">+</span>
<span class="click" onclick="suara(teks3)" id="teks3" style="display:none;">PI</span>
</div>

<div class="hasil click" onclick="suara(hasilAkhir)" id="hasil">
BA
</div>

<div class="vokal">
<button onclick="pilihVokal('A')">A</button>
<button onclick="pilihVokal('I')">I</button>
<button onclick="pilihVokal('U')">U</button>
<button onclick="pilihVokal('E')">E</button>
<button onclick="pilihVokal('O')">O</button>
</div>

<div class="mode">
<button onclick="gabungLanjut()">+ Gabung Lagi</button>
<button onclick="reset()">Reset</button>
</div>

</div>

<div class="huruf" id="hurufContainer"></div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

let konsonan = "B";
let vokal = "A";

let teks1 = "B";
let teks2 = "A";
let teks3 = "";

let gabung1 = "BA";
let hasilAkhir = "BA";

let tahap2 = false;

// ================= SUARA =================
function suara(t){
let msg = new SpeechSynthesisUtterance(t.toLowerCase());
msg.lang = "id-ID";
msg.rate = 0.7;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){
teks1 = konsonan;
teks2 = vokal;
gabung1 = konsonan + vokal;

if(!tahap2){
hasilAkhir = gabung1;
}

document.getElementById("gabung1").innerText = gabung1;
document.getElementById("hasil").innerText = hasilAkhir;
}

// ================= PILIH =================
function pilihVokal(v){
vokal = v;
update();
suara(v);
}

function pilihKonsonan(h){
konsonan = h;
update();
suara(h);
}

// ================= GABUNG LANJUT =================
function gabungLanjut(){
tahap2 = true;

teks3 = konsonan + vokal;

document.getElementById("teks3").style.display = "inline";
document.getElementById("plus2").style.display = "inline";

document.getElementById("teks3").innerText = teks3;

hasilAkhir = gabung1 + teks3;

document.getElementById("hasil").innerText = hasilAkhir;

suara(teks3);
setTimeout(()=>suara(hasilAkhir),700);
}

// ================= RESET =================
function reset(){
tahap2 = false;
teks3 = "";
hasilAkhir = gabung1;

document.getElementById("teks3").style.display = "none";
document.getElementById("plus2").style.display = "none";

update();
}

// ================= TOMBOL HURUF =================
let html="";
hurufList.forEach(h=>{
html += `<button onclick="pilihKonsonan('${h}')">${h}</button>`;
});
document.getElementById("hurufContainer").innerHTML = html;

// start
update();
</script>

</body>
</html>
