<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengeja Otomatis</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff7ed;
margin:0;
padding:20px;
}

h1{margin-bottom:10px;}

.kotak{
background:white;
border-radius:15px;
padding:25px;
max-width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bar{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
font-size:45px;
margin-bottom:20px;
}

.hasil{
font-size:40px;
font-weight:bold;
color:#1e3a8a;
margin-top:10px;
}

.clickable{
cursor:pointer;
padding:10px;
border-radius:10px;
}

.clickable:active{
transform:scale(0.9);
background:#fde68a;
}

.control{
margin-top:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<h1>Belajar Mengeja</h1>

<div class="kotak">

<div class="bar">
<span id="konsonan" class="clickable" onclick="suaraHuruf(konsonan)">B</span>
<span>+</span>
<span id="vokal" class="clickable" onclick="suaraHuruf(vokal)">A</span>
</div>

<div id="hasil" class="hasil clickable" onclick="suaraHuruf(konsonan+vokal)">
BA
</div>

<div class="control">
<button onclick="startAuto()">▶️ Mulai</button>
<button onclick="stopAuto()">⏸️ Stop</button>
</div>

</div>

<script>
// ================= DATA =================
let hurufList = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Y","Z"
];

let vokalList = ["A","I","U","E","O"];

let i = 0;
let j = 0;

let konsonan = hurufList[i];
let vokal = vokalList[j];

let jalan = false;

// ================= SUARA =================
function suaraHuruf(teks){
let msg = new SpeechSynthesisUtterance(teks);
msg.lang = "id-ID";
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// ================= UPDATE =================
function update(){
document.getElementById("konsonan").innerText = konsonan;
document.getElementById("vokal").innerText = vokal;
document.getElementById("hasil").innerText = konsonan + vokal;
}

// ================= AUTO JALAN =================
function loop(){

if(!jalan) return;

update();

// urutan suara: B → A → BA
suaraHuruf(konsonan);

setTimeout(()=>{
suaraHuruf(vokal);
},700);

setTimeout(()=>{
suaraHuruf(konsonan+vokal);
},1400);

// lanjut ke berikutnya
setTimeout(()=>{

j++;

if(j >= vokalList.length){
j = 0;
i++;

if(i >= hurufList.length){
i = 0;
}
}

konsonan = hurufList[i];
vokal = vokalList[j];

loop();

},2500);

}

// ================= CONTROL =================
function startAuto(){
jalan = true;
loop();
}

function stopAuto(){
jalan = false;
speechSynthesis.cancel();
}

// start awal
update();
</script>

</body>
</html>
